spring:
  application:
    name: smartmerge
  profiles:
    active: dev
  ai:
    openai:
      api-key: ${openai.api-key}
      chat:
        options:
          model: gpt-4o
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${gitHubClientId}
            client-secret: ${gitHubClientSecret}
            scope:
              - read:user
              - user:email
  datasource:
    url: ${postgres.url}
    username: ${postgres.name}
    password: ${postgres.password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

client:
  url: "http://localhost:5173"

jwt:
  secret.key: ${jwtSecret}

server:
  port: ${PORT:8081}

github:
  appId: ${github.appId}
  key: ${github.key}
